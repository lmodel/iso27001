name: iso27001
annotations:
  standard_reference:
    tag: standard_reference
    value: ISO/IEC 27001:2022(E)
  standard_title:
    tag: standard_title
    value: "Information security, cybersecurity and privacy protection \u2014  Information\
      \ security management systems \u2014 Requirements"
  standard_edition:
    tag: standard_edition
    value: Third edition
  standard_date:
    tag: standard_date
    value: 2022-10
  normative_reference:
    tag: normative_reference
    value: ISO/IEC 27000 (vocabulary and overview)
  aligned_standard:
    tag: aligned_standard
    value: ISO/IEC 27002:2022 (Annex A control guidance)
  risk_framework_alignment:
    tag: risk_framework_alignment
    value: ISO 31000:2018
  schema_maintainer:
    tag: schema_maintainer
    value: noel.mcloughlin@gmail.com
  schema_status:
    tag: schema_status
    value: stable
description: 'A comprehensive LinkML schema modeling the requirements, clauses, and
  Annex A controls of ISO/IEC 27001:2022. Designed for open data publication, automated
  validation, and integration with governance, risk, and compliance (GRC) systems.

  This schema captures: - ISMS lifecycle (establish, implement, maintain, improve)
  - Risk assessment and treatment processes (Clause 6.1) - All 93 Annex A controls
  organized by domain - Audit, measurement, and continual improvement artifacts'
title: ISO/IEC 27001:2022 Information Security Management System Schema
id: https://w3id.org/lmodel/iso-iec-27001
version: 1.0.0
imports:
- linkml:types
license: https://creativecommons.org/licenses/by/4.0/
prefixes:
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  iso27001:
    prefix_prefix: iso27001
    prefix_reference: https://w3id.org/lmodel/iso-iec-27001/
  iso27002:
    prefix_prefix: iso27002
    prefix_reference: https://w3id.org/lmodel/iso-iec-27002/
  iso:
    prefix_prefix: iso
    prefix_reference: https://www.iso.org/standard/
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  dcterms:
    prefix_prefix: dcterms
    prefix_reference: http://purl.org/dc/terms/
  skos:
    prefix_prefix: skos
    prefix_reference: http://www.w3.org/2004/02/skos/core#
  prov:
    prefix_prefix: prov
    prefix_reference: http://www.w3.org/ns/prov#
default_prefix: iso27001
default_range: string
subsets:
  isms_core:
    name: isms_core
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/IsmsCore
    description: Core ISMS structural elements required for conformity with Clauses
      4-10. These classes represent the minimum viable data model for ISMS documentation.
    comments:
    - Mandatory for any ISO 27001 conformance dataset
    - Maps to "shall" requirements in the standard
    from_schema: https://w3id.org/lmodel/iso-iec-27001
  annex_a_controls:
    name: annex_a_controls
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/AnnexAControls
    annotations:
      control_count:
        tag: control_count
        value: '93'
    description: 'Classes and enumerations representing the 93 controls in Annex A,
      organized into four domains: organizational, people, physical, technological.'
    comments:
    - Derived from ISO/IEC 27002:2022 Clauses 5-8
    - Used in Statement of Applicability (SoA) generation
    from_schema: https://w3id.org/lmodel/iso-iec-27001
  risk_management:
    name: risk_management
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/RiskManagement
    description: Elements supporting risk assessment (6.1.2) and risk treatment (6.1.3).
      Aligned with ISO 31000:2018 principles.
    comments:
    - Includes risk identification, analysis, evaluation, and treatment
    - Links risks to controls and residual risk acceptance
    from_schema: https://w3id.org/lmodel/iso-iec-27001
  performance_evaluation:
    name: performance_evaluation
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/PerformanceEvaluation
    description: Classes for monitoring, measurement, internal audit, and management
      review per Clauses 9.1-9.3.
    comments:
    - Captures audit programs, findings, and KPIs
    - Supports evidence retention requirements
    from_schema: https://w3id.org/lmodel/iso-iec-27001
  continual_improvement:
    name: continual_improvement
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/ContinualImprovement
    description: Elements for nonconformity management, corrective actions, and improvement
      tracking per Clause 10.
    comments:
    - Links nonconformities to root causes and corrective actions
    - Tracks improvement opportunities
    from_schema: https://w3id.org/lmodel/iso-iec-27001
  documented_information:
    name: documented_information
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/DocumentedInformation
    description: Classes representing required documented information per Clause 7.5.
      Supports document control and retention requirements.
    comments:
    - Includes policies, procedures, records, and evidence
    - Tracks version control and approval status
    from_schema: https://w3id.org/lmodel/iso-iec-27001
types:
  positive integer type:
    name: positive integer type
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/PositiveIntegerType
    description: integer greater than zero; natural number explicitly excluding zero
    from_schema: https://w3id.org/lmodel/iso-iec-27001
    exact_mappings:
    - wikidata:Q28920044
    base: int
    uri: xsd:positiveInteger
  unsigned short type:
    name: unsigned short type
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/UnsignedShortType
    description: data type for non-negative integers that can be represented with
      16 bits
    from_schema: https://w3id.org/lmodel/iso-iec-27001
    exact_mappings:
    - wikidata:Q110650833
    base: int
    uri: xsd:unsignedShort
  duration type:
    name: duration type
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/DurationType
    description: ISO 8601 duration value such as P1Y, P30D, or PT4H
    from_schema: https://w3id.org/lmodel/iso-iec-27001
    base: str
    uri: xsd:duration
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  ControlCategory:
    name: ControlCategory
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/ControlCategory
    annotations:
      iso27002_mapping:
        tag: iso27002_mapping
        value: Clauses 5-8
    description: The four control domains defined in ISO/IEC 27001:2022 Annex A, corresponding
      to Clauses 5-8 of ISO/IEC 27002:2022.
    in_subset:
    - annex_a_controls
    from_schema: https://w3id.org/lmodel/iso-iec-27001
    permissible_values:
      organizational:
        text: organizational
        description: "Organizational controls (Annex A.5) \u2014 policies, roles,\
          \ asset management, access control, supplier relationships, incident management,\
          \ compliance."
        annotations:
          annex_clause:
            tag: annex_clause
            value: '5'
          control_count:
            tag: control_count
            value: '37'
      people:
        text: people
        description: "People controls (Annex A.6) \u2014 screening, employment terms,\
          \ awareness, disciplinary process, termination responsibilities, remote\
          \ working."
        annotations:
          annex_clause:
            tag: annex_clause
            value: '6'
          control_count:
            tag: control_count
            value: '8'
      physical:
        text: physical
        description: "Physical controls (Annex A.7) \u2014 perimeters, entry controls,\
          \ equipment protection, secure areas, media handling, cabling, maintenance."
        annotations:
          annex_clause:
            tag: annex_clause
            value: '7'
          control_count:
            tag: control_count
            value: '14'
      technological:
        text: technological
        description: "Technological controls (Annex A.8) \u2014 endpoint security,\
          \ access restrictions, authentication, malware protection, logging, cryptography,\
          \ secure development."
        annotations:
          annex_clause:
            tag: annex_clause
            value: '8'
          control_count:
            tag: control_count
            value: '34'
  ImplementationStatus:
    name: ImplementationStatus
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/ImplementationStatus
    description: Lifecycle status of a security control, used in Statement of Applicability
      and control tracking.
    in_subset:
    - annex_a_controls
    from_schema: https://w3id.org/lmodel/iso-iec-27001
    permissible_values:
      not_started:
        text: not_started
        description: Control identified but no implementation activities begun.
      planned:
        text: planned
        description: Control scheduled for implementation with defined timeline.
      in_progress:
        text: in_progress
        description: Implementation actively underway but not yet complete.
      implemented:
        text: implemented
        description: Control fully implemented and operational.
      not_applicable:
        text: not_applicable
        description: Control excluded from scope with documented justification per
          6.1.3 d).
        comments:
        - Requires justification in Statement of Applicability
  RiskTreatmentOption:
    name: RiskTreatmentOption
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/RiskTreatmentOption
    annotations:
      iso31000_reference:
        tag: iso31000_reference
        value: Clause 6.5
    description: Standard risk treatment options per ISO 31000 and ISO 27005.
    in_subset:
    - risk_management
    from_schema: https://w3id.org/lmodel/iso-iec-27001
    permissible_values:
      modify:
        text: modify
        description: Apply controls to change the risk level (reduce likelihood or
          impact).
        aliases:
        - mitigate
        - reduce
      accept:
        text: accept
        description: Accept the risk without further treatment, within risk appetite.
          Requires risk owner approval.
        aliases:
        - retain
      avoid:
        text: avoid
        description: Eliminate the risk by removing the activity or asset that creates
          it.
        aliases:
        - terminate
      share:
        text: share
        description: Transfer or share risk with external parties (e.g., insurance,
          outsourcing).
        aliases:
        - transfer
  RiskLevel:
    name: RiskLevel
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/RiskLevel
    description: "Qualitative risk rating derived from likelihood \xD7 impact analysis."
    in_subset:
    - risk_management
    from_schema: https://w3id.org/lmodel/iso-iec-27001
    permissible_values:
      very_low:
        text: very_low
        description: Negligible risk requiring no immediate action.
      low:
        text: low
        description: Minor risk manageable through routine procedures.
      medium:
        text: medium
        description: Moderate risk requiring management attention and planned controls.
      high:
        text: high
        description: Significant risk requiring priority treatment and escalation.
      critical:
        text: critical
        description: Severe risk threatening organizational objectives; requires immediate
          executive action and resource allocation.
  DocumentType:
    name: DocumentType
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/DocumentType
    description: Categories of documented information required or recommended by ISO
      27001.
    in_subset:
    - documented_information
    from_schema: https://w3id.org/lmodel/iso-iec-27001
    permissible_values:
      policy:
        text: policy
        description: High-level statement of intent and direction (e.g., IS policy
          per 5.2).
      procedure:
        text: procedure
        description: Documented steps for performing activities consistently.
      standard:
        text: standard
        description: Mandatory requirements for specific technologies or processes.
      guideline:
        text: guideline
        description: Recommended practices that support policies and procedures.
      record:
        text: record
        description: Evidence of activities performed or results achieved.
      plan:
        text: plan
        description: Documented approach for achieving objectives (e.g., risk treatment
          plan).
      report:
        text: report
        description: Formal output of assessment, audit, or review activities.
  AuditFindingType:
    name: AuditFindingType
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/AuditFindingType
    description: Classification of internal audit findings.
    in_subset:
    - performance_evaluation
    from_schema: https://w3id.org/lmodel/iso-iec-27001
    permissible_values:
      major_nonconformity:
        text: major_nonconformity
        description: Significant failure to fulfill a requirement that affects ISMS
          capability to achieve intended outcomes.
      minor_nonconformity:
        text: minor_nonconformity
        description: Isolated lapse that does not significantly affect ISMS effectiveness.
      observation:
        text: observation
        description: Noted condition that could lead to nonconformity if not addressed.
        aliases:
        - opportunity_for_improvement
      positive_finding:
        text: positive_finding
        description: Evidence of effective implementation exceeding requirements.
  LikelihoodRating:
    name: LikelihoodRating
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/LikelihoodRating
    description: Qualitative likelihood scale for risk assessment.
    in_subset:
    - risk_management
    from_schema: https://w3id.org/lmodel/iso-iec-27001
    permissible_values:
      rare:
        text: rare
        description: Highly unlikely to occur (< 5% probability).
        annotations:
          numeric_value:
            tag: numeric_value
            value: '1'
      unlikely:
        text: unlikely
        description: Not expected but possible (5-20% probability).
        annotations:
          numeric_value:
            tag: numeric_value
            value: '2'
      possible:
        text: possible
        description: May occur at some point (20-50% probability).
        annotations:
          numeric_value:
            tag: numeric_value
            value: '3'
      likely:
        text: likely
        description: Probably will occur (50-80% probability).
        annotations:
          numeric_value:
            tag: numeric_value
            value: '4'
      almost_certain:
        text: almost_certain
        description: Expected to occur in most circumstances (> 80% probability).
        annotations:
          numeric_value:
            tag: numeric_value
            value: '5'
  ImpactRating:
    name: ImpactRating
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/ImpactRating
    description: Qualitative impact scale for risk assessment.
    in_subset:
    - risk_management
    from_schema: https://w3id.org/lmodel/iso-iec-27001
    permissible_values:
      negligible:
        text: negligible
        description: No significant impact on operations or objectives.
        annotations:
          numeric_value:
            tag: numeric_value
            value: '1'
      minor:
        text: minor
        description: Limited impact, easily absorbed by normal operations.
        annotations:
          numeric_value:
            tag: numeric_value
            value: '2'
      moderate:
        text: moderate
        description: Noticeable impact requiring management intervention.
        annotations:
          numeric_value:
            tag: numeric_value
            value: '3'
      major:
        text: major
        description: Serious impact on objectives, reputation, or compliance.
        annotations:
          numeric_value:
            tag: numeric_value
            value: '4'
      severe:
        text: severe
        description: Catastrophic impact threatening organizational viability.
        annotations:
          numeric_value:
            tag: numeric_value
            value: '5'
slots:
  id:
    name: id
    definition_uri: https://w3id.org/lmodel/iso-iec-27001/id
    description: Unique identifier for the entity.
    comments:
    - Should use consistent URI/CURIE format across the dataset
    examples:
    - value: iso27001:risk-001
    - value: iso27001:control-5.1
    from_schema: https://w3id.org/lmodel/iso-iec-27001
    slot_uri: iso27001:id
    identifier: true
    owner: NamedEntity
    domain_of:
    - NamedEntity
    range: uriorcurie
    required: true
  name:
