id: iso27001:control-implement-an-mdm
name: Implement an MDM
control_id: "8.19"
control_title: Implement an MDM
control_category: technological
control_text: >-
  An MDM enforces consistent security policies, ensures encryption and up-to-date patches,
  and can remotely lock or wipe devices if they’re lost, reducing the risk of data breaches
  and unauthorized access
implementation_status: not_started
