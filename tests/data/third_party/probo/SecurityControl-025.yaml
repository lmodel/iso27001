id: iso27001:control-implement-visitor-access-policies
name: Keep track of visitors
control_id: "7.2"
control_title: Keep track of visitors
control_category: physical
control_text: >-
  Even if you do most of your business online, you still have offices, computers or even
  printed document: you need to make sure those assets are physically secured (we will focus
  on the digital access later) regarding visitors
implementation_guidance: >-
  In your policies, we will mention that all visitors must be accompanied by an employee at
  all times. On your end, you need to keep track of them (and accompany them)
implementation_status: not_started
