id: iso27001:control-keep-an-history-of-all-your-changes
name: Keep an history of all your changes
control_id: "8.9"
control_title: Keep an history of all your changes
control_category: technological
control_text: >-
  Infrastructure as Code (IaC) makes sure all your infrastructure changes are done in a
  standardized and repeatable process - the chance of human error is lower. Moreover, IaC
  enables version control and peer reviews
implementation_guidance: >-
  **Option 1:** If you don’t want an IaC, provide a screenshot of the logs of your
  infrastructure changes. **Option 2:** If you already have an IaC, we only need a
  screenshot of it
implementation_status: not_started
