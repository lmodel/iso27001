  string status = 0
  string classification = 0
  durationType retentionPeriod = 0
 repeated  soAEntry soaEntries = 0
  unsignedShortType totalControls = 0
  unsignedShortType implementedCount = 0
  unsignedShortType plannedCount = 0
  unsignedShortType notApplicableCount = 0
  date lastReviewDate = 0
  string approvedBy = 0
 }
