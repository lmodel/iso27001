// A security control from Annex A of ISO/IEC 27001:2022, derived from ISO/IEC 27002:2022. Represents a measure that modifies risk.
message SecurityControl
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string version = 0
  string controlId = 0
  string controlTitle = 0
  controlCategory controlCategory = 0
  string controlText = 0
  string implementationGuidance = 0
 repeated  securityControl relatedControls = 0
 repeated  string applicableThreats = 0
 repeated  string applicableAssets = 0
  string controlOwner = 0
  implementationStatus implementationStatus = 0
  date implementationDate = 0
  string effectivenessRating = 0
  date lastTestDate = 0
 repeated  string evidenceReferences = 0
 }
// A single entry in the Statement of Applicability, documenting the applicability and implementation status of one control.
