 {
  securityControl controlReference = 0
  boolean isApplicable = 0
  string inclusionJustification = 0
  string exclusionJustification = 0
  implementationStatus implementationStatus = 0
  string implementationEvidence = 0
  role responsibleRole = 0
  date targetImplementationDate = 0
 }
