 }
// An information security event per A.5.25, which may or may not be categorized as an incident.
message InformationSecurityEvent
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string version = 0
  datetime eventDatetime = 0
  string reporter = 0
  string eventDescription = 0
 repeated  asset affectedAssets = 0
  string initialAssessment = 0
  boolean categorizedAsIncident = 0
  informationSecurityIncident linkedIncident = 0
 }
// An information security incident per A.5.26, requiring response per documented procedures.
message InformationSecurityIncident
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string version = 0
  datetime incidentDatetime = 0
  string incidentCategory = 0
  string severity = 0
 repeated  asset affectedAssets = 0
 repeated  string affectedCia = 0
  string incidentDescription = 0
  string detectionMethod = 0
 repeated  string responseActions = 0
 repeated  string containmentActions = 0
 repeated  string eradicationActions = 0
 repeated  string recoveryActions = 0
  string rootCause = 0
  string lessonsLearned = 0
 repeated  string evidenceCollected = 0
  boolean notificationRequired = 0
 repeated  string notificationsMade = 0
  datetime closureDatetime = 0
  string postIncidentReview = 0
 }
// Top-level container representing an organization's complete ISMS per ISO 27001. Aggregates all components required for establishing, implementing, maintaining, and continually improving information security management.
message InformationSecurityManagementSystem
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string version = 0
  organization organization = 0
  string scopeStatement = 0
 repeated  string scopeBoundaries = 0
 repeated  string scopeExclusions = 0
 repeated  string contextInternalIssues = 0
 repeated  string contextExternalIssues = 0
 repeated  interestedParty interestedParties = 0
  informationSecurityPolicy informationSecurityPolicy = 0
 repeated  informationSecurityObjective objectives = 0
  riskAssessmentProcess riskAssessmentProcess = 0
  riskTreatmentProcess riskTreatmentProcess = 0
  statementOfApplicability statementOfApplicability = 0
 repeated  securityControl controls = 0
 repeated  role roles = 0
 repeated  resource resources = 0
 repeated  competenceRecord competenceRecords = 0
  awarenessProgram awarenessProgram = 0
  communicationPlan communicationPlan = 0
 repeated  documentedInformation documentedInformationRegister = 0
 repeated  operationalProcedure operationalProcedures = 0
 repeated  riskAssessment riskAssessments = 0
 repeated  riskTreatmentPlan riskTreatmentPlans = 0
  monitoringProgram monitoringProgram = 0
 repeated  internalAudit internalAudits = 0
 repeated  managementReview managementReviews = 0
 repeated  nonconformity nonconformities = 0
 repeated  correctiveAction correctiveActions = 0
 repeated  improvementOpportunity improvements = 0
  string certificationStatus = 0
  string certificationBody = 0
  date certificationDate = 0
  date recertificationDate = 0
 }
