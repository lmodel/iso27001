// metamodel_version: 1.7.0
// version: 1.0.0
// An information asset or associated asset requiring protection, per Annex A control 5.9.
message Asset
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string version = 0
  string assetType = 0
  string assetOwner = 0
  string assetCustodian = 0
  string classification = 0
  string location = 0
  string criticality = 0
 repeated  risk relatedRisks = 0
 repeated  securityControl applicableControls = 0
 }
// A finding from an internal audit, including nonconformities, observations, and positive findings.
message AuditFinding
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string version = 0
  auditFindingType findingType = 0
  string clauseReference = 0
  securityControl controlReference = 0
  string findingDescription = 0
  string objectiveEvidence = 0
  string rootCauseAnalysis = 0
  string riskImplication = 0
  string recommendedAction = 0
  string auditeeResponse = 0
  correctiveAction linkedCorrectiveAction = 0
  string closureStatus = 0
  date closureDate = 0
 }
